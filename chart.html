<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>차트</title>
<style>
  :root{--bg:#080b10;--card:#0f1318;--card2:#151a22;--border:rgba(255,255,255,.08);
  --up:#00e896;--dn:#ff4060;--blue:#4da6ff;--gold:#ffc940;--orange:#ff8c3a;
  --purple:#a78bfa;--t1:#f0f4ff;--t2:#b8ccee;--t3:#6a80aa}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,"Segoe UI",sans-serif}
  .tradingview-widget-container,.tradingview-widget-container__widget{height:100%;width:100%}
  .chart-box{height:70vh;min-height:420px;background:#0f1318}
  .section{margin:14px;padding:14px;background:var(--card2);border:1px solid var(--border);border-radius:12px}
  .section h3{font-size:13px;color:var(--t2);margin-bottom:10px;font-weight:600}
  .widget-box{height:380px}
  .fc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .fc-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px}
  .fc-label{font-size:11px;color:var(--t3);margin-bottom:4px}
  .fc-value{font-size:16px;font-weight:700;color:var(--t1)}
  .fc-value.fc-up{color:var(--up)}
  .fc-value.fc-down{color:var(--dn)}
  .fc-value.fc-good{color:var(--up)}
  .fc-value.fc-warn{color:var(--gold)}
  .fc-sub{font-size:11px;color:var(--t3);margin-top:2px}
  .fc-sub.fc-up{color:var(--up)}
  .fc-sub.fc-down{color:var(--dn)}
  .fc-range{margin-top:12px}
  .fc-range-track{position:relative;height:6px;background:var(--border);border-radius:3px}
  .fc-range-fill{position:absolute;height:6px;background:var(--blue);border-radius:3px}
  .fc-range-dot{position:absolute;top:-3px;width:12px;height:12px;background:var(--t1);border-radius:50%;transform:translateX(-50%)}
  .fc-range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-top:6px}
  .fc-range-pct{color:var(--t2);font-weight:600}
  .fc-rec{font-size:12px;color:var(--t2);margin-top:10px}
  .fc-rec b{color:var(--t1)}
  .fc-empty{font-size:12px;color:var(--t3);text-align:center;padding:20px}
  .fc-verdict{border-left:4px solid var(--t3);background:var(--card);border-radius:8px;padding:10px 12px;margin-bottom:14px}
  .fc-verdict-good{border-color:var(--up)}
  .fc-verdict-warn{border-color:var(--gold)}
  .fc-verdict-bad{border-color:var(--dn)}
  .fc-verdict-neutral{border-color:var(--t3)}
  .fc-verdict-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px}
  .fc-verdict-sub{font-size:11px;color:var(--t3)}
  .fc-subhead{font-size:12px;font-weight:600;color:var(--t2);margin:14px 0 8px}
  .fc-metric{margin-bottom:16px}
  .fc-metric-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .fc-metric-label{font-size:12px;font-weight:600;color:var(--t1)}
  .fc-metric-desc{font-size:10px;color:var(--t3);margin-top:2px}
  .fc-metric-val{text-align:right;flex-shrink:0}
  .fc-value-num{display:block;font-size:15px;font-weight:700;color:var(--t1)}
  .fc-badge{display:inline-block;font-size:10px;font-weight:600;border-radius:4px;padding:1px 5px;margin-top:2px}
  .fc-badge.fc-good{color:var(--up);background:rgba(0,232,150,.12)}
  .fc-badge.fc-warn{color:var(--gold);background:rgba(255,201,64,.12)}
  .fc-bar-wrap{position:relative;height:22px;margin-top:14px}
  .fc-bar-marker-label{position:absolute;top:-14px;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--t2);white-space:nowrap}
  .fc-bar-track{position:relative;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--dn),var(--gold),var(--up));margin-top:8px}
  .fc-bar-marker{position:absolute;top:-3px;width:12px;height:12px;background:var(--t1);border:2px solid var(--bg);border-radius:50%;transform:translateX(-50%)}
  .fc-bench-text{font-size:10px;color:var(--t3);margin-top:6px}
  .fc-tip{font-size:10px;color:var(--t3);margin-top:3px}
  .fc-footnote{font-size:9px;color:var(--t3);margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
  .fc-badge.fc-neutral{color:var(--blue);background:rgba(77,166,255,.12)}
  .ov-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .ov-name{font-size:15px;font-weight:700;color:var(--t1)}
  .ov-ticker{font-size:11px;font-weight:400;color:var(--t3)}
  .ov-badges{display:flex;gap:6px;flex-wrap:wrap}
  .ov-highlight{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.6;color:var(--t2);margin-bottom:14px}
  .ov-compare{margin:14px 0}
  .ov-compare-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px}
  .ov-compare-label{width:96px;flex-shrink:0;color:var(--t2)}
  .ov-compare-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
  .ov-compare-fill{height:10px;background:var(--blue);border-radius:5px}
  .ov-compare-value{width:64px;flex-shrink:0;text-align:right;color:var(--t1);font-weight:600}
  .ov-tags{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0}
  .ov-tag{font-size:10px;color:var(--t2);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3px 9px}
  .ov-events{margin-top:14px}
  .ov-event{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
  .ov-event:last-of-type{border-bottom:none}
  .ov-event-date{width:96px;flex-shrink:0;font-size:11px;color:var(--t3);font-weight:600}
  .ov-event-title{font-size:12px;color:var(--t1);font-weight:600}
  .ov-event-detail{font-size:11px;color:var(--t3);margin-top:2px}
</style>
</head>
<body>
<div class="chart-box" id="tv-chart">
  <div class="tradingview-widget-container" style="height:100%"><div class="tradingview-widget-container__widget"></div></div>
</div>

<div class="section" style="padding:6px 14px">
  <div class="widget-box" style="height:120px" id="tv-symbol-info">
    <div class="tradingview-widget-container" style="height:100%"><div class="tradingview-widget-container__widget"></div></div>
  </div>
</div>

<div class="section">
  <h3>어떤 회사인가요?</h3>
  <div id="fc-overview" class="fc-empty">데이터 불러오는 중...</div>
</div>

<div class="section">
  <h3>핵심 지표</h3>
  <div id="fc-core" class="fc-empty">데이터 불러오는 중...</div>
</div>

<div class="section">
  <h3>기업 개요</h3>
  <div class="widget-box" style="height:420px" id="tv-profile">
    <div class="tradingview-widget-container" style="height:100%"><div class="tradingview-widget-container__widget"></div></div>
  </div>
</div>

<div class="section">
  <h3>수익성 · 재무건전성</h3>
  <div id="fc-health" class="fc-empty">데이터 불러오는 중...</div>
</div>

<div class="section">
  <h3>재무 데이터</h3>
  <div class="widget-box" style="height:500px" id="tv-financials">
    <div class="tradingview-widget-container" style="height:100%"><div class="tradingview-widget-container__widget"></div></div>
  </div>
</div>

<div class="section">
  <h3>향후 전망</h3>
  <div id="fc-outlook" class="fc-empty">데이터 불러오는 중...</div>
</div>

<div class="section">
  <h3>기술적 분석</h3>
  <div class="widget-box" style="height:450px" id="tv-technical">
    <div class="tradingview-widget-container" style="height:100%"><div class="tradingview-widget-container__widget"></div></div>
  </div>
</div>

<script>
  var params = new URLSearchParams(location.search);
  var symbol = params.get('symbol') || 'NASDAQ:AAPL';
  document.title = symbol + ' 차트';

  function addWidget(id, src, cfg) {
    var container = document.getElementById(id).querySelector('.tradingview-widget-container');
    var s = document.createElement('script');
    s.type = 'text/javascript';
    s.src = src;
    s.async = true;
    s.text = JSON.stringify(cfg);
    container.appendChild(s);
  }

  addWidget('tv-chart', 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js', {
    "autosize": true,
    "symbol": symbol,
    "interval": "D",
    "timezone": "Asia/Seoul",
    "theme": "dark",
    "style": "1",
    "locale": "kr",
    "backgroundColor": "rgba(15, 19, 24, 1)",
    "gridColor": "rgba(255, 255, 255, 0.06)",
    "studies": ["MACD@tv-basicstudies", "RSI@tv-basicstudies", "Stochastic@tv-basicstudies"],
    "allow_symbol_change": false,
    "support_host": "https://www.tradingview.com"
  });

  addWidget('tv-symbol-info', 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js', {
    "symbol": symbol,
    "width": "100%",
    "locale": "kr",
    "colorTheme": "dark",
    "isTransparent": true
  });

  addWidget('tv-profile', 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-profile.js', {
    "symbol": symbol,
    "width": "100%",
    "height": "100%",
    "locale": "kr",
    "colorTheme": "dark",
    "isTransparent": true
  });

  addWidget('tv-financials', 'https://s3.tradingview.com/external-embedding/embed-widget-financials.js', {
    "symbol": symbol,
    "width": "100%",
    "height": "100%",
    "locale": "kr",
    "colorTheme": "dark",
    "isTransparent": true,
    "displayMode": "regular"
  });

  addWidget('tv-technical', 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js', {
    "symbol": symbol,
    "width": "100%",
    "height": "100%",
    "locale": "kr",
    "colorTheme": "dark",
    "isTransparent": true,
    "interval": "1D",
    "showIntervalTabs": true
  });
</script>
<script src="chart-health-data.js"></script>
<script src="chart-outlook-data.js"></script>
<script src="chart-overview-data.js"></script>
<script src="chart-overview.js"></script>
<script src="chart-fundamentals.js"></script>
</body>
</html>
