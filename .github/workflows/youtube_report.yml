name: YouTube 딥리포트 생성

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: YouTube 리포트 생성
        run: python modules/youtube_report.py "${{ inputs.youtube_url }}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 대시보드 재빌드
        run: python generate.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@dashboard.local"
          git add index.html reports.json || true
          git diff --staged --quiet || git commit -m "YouTube 리포트 추가 $(TZ='Asia/Seoul' date '+%Y년 %m월 %d일 %H:%M')"
          git push
